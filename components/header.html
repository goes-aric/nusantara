<!-- ============================================================
     HEADER COMPONENT
     File: components/header.html
     Berisi: Logo, navigasi utama, search bar, dan ikon cart/user
     ============================================================ -->
<header class="sticky top-0 z-50 bg-cream border-b border-border-warm shadow-sm">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Top Bar -->
    <div class="flex items-center justify-between py-3 border-b border-border-warm/50">
      <p class="text-xs text-warm-mid tracking-widest uppercase">
        🚚 Gratis ongkir untuk pembelian di atas Rp 500.000
      </p>
      <div class="flex items-center gap-5 text-xs text-warm-mid">
        <a href="#" class="hover:text-terracotta transition-colors">Lacak Pesanan</a>
        <span class="text-border-warm">|</span>
        <a href="#" class="hover:text-terracotta transition-colors">Bantuan</a>
        <span class="text-border-warm">|</span>
        <a href="#" class="hover:text-terracotta transition-colors">Masuk</a>
      </div>
    </div>

    <!-- Main Header Row -->
    <div class="flex items-center gap-6 py-4">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3 shrink-0">
        <div class="w-9 h-9 bg-terracotta rounded-lg flex items-center justify-center">
          <span class="text-white font-display font-bold text-lg leading-none">N</span>
        </div>
        <div>
          <span class="font-display text-xl font-semibold text-warm-dark tracking-tight">Nusantara</span>
          <span class="block text-[10px] text-warm-mid tracking-[0.2em] uppercase -mt-0.5">Heritage Store</span>
        </div>
      </a>

      <!-- Search Bar -->
      <div class="flex-1 max-w-2xl">
        <div class="relative group">
          <input
            type="text"
            placeholder="Cari produk, koleksi, atau merek..."
            class="w-full bg-white border border-border-warm rounded-full py-2.5 pl-5 pr-12
                   text-sm text-warm-dark placeholder-sand/80 outline-none
                   focus:border-terracotta focus:ring-2 focus:ring-terracotta/10
                   transition-all duration-200"
          />
          <button
            class="absolute right-1.5 top-1/2 -translate-y-1/2 
                   w-8 h-8 bg-terracotta rounded-full 
                   flex items-center justify-center
                   hover:bg-terracotta-light transition-colors"
            aria-label="Cari"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Action Icons -->
      <div class="flex items-center gap-2 shrink-0">
        <!-- Wishlist -->
        <button class="relative w-10 h-10 flex items-center justify-center rounded-full hover:bg-terracotta-pale transition-colors group" aria-label="Wishlist">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-warm-mid group-hover:text-terracotta transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>

        <!-- Cart -->
        <button class="relative w-10 h-10 flex items-center justify-center rounded-full hover:bg-terracotta-pale transition-colors group" aria-label="Keranjang">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-warm-mid group-hover:text-terracotta transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke-linecap="round"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-terracotta text-white text-[10px] font-bold rounded-full flex items-center justify-center">3</span>
        </button>

        <!-- Profile -->
        <button class="w-10 h-10 rounded-full border-2 border-border-warm overflow-hidden hover:border-terracotta transition-colors" aria-label="Profil">
          <div class="w-full h-full bg-sand flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-warm-mid" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
            </svg>
          </div>
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex items-center gap-1 pb-1" aria-label="Navigasi utama">
      <a href="#" class="px-4 py-2 text-sm font-medium text-warm-dark hover:text-terracotta hover:bg-terracotta-pale rounded-lg transition-all">Beranda</a>
      <a href="#" class="px-4 py-2 text-sm font-medium text-warm-dark hover:text-terracotta hover:bg-terracotta-pale rounded-lg transition-all">Koleksi</a>
      <a href="#" class="px-4 py-2 text-sm font-medium text-terracotta bg-terracotta-pale rounded-lg transition-all">Produk</a>
      <a href="#" class="px-4 py-2 text-sm font-medium text-warm-dark hover:text-terracotta hover:bg-terracotta-pale rounded-lg transition-all">Batik</a>
      <a href="#" class="px-4 py-2 text-sm font-medium text-warm-dark hover:text-terracotta hover:bg-terracotta-pale rounded-lg transition-all">Kerajinan</a>
      <a href="#" class="px-4 py-2 text-sm font-medium text-warm-dark hover:text-terracotta hover:bg-terracotta-pale rounded-lg transition-all">Kuliner</a>
      <a href="#" class="px-4 py-2 text-sm font-medium text-warm-dark hover:text-terracotta hover:bg-terracotta-pale rounded-lg transition-all">Flash Sale</a>
      <div class="ml-auto">
        <span class="badge">🔥 Sale hingga 50%</span>
      </div>
    </nav>

  </div>
</header>
