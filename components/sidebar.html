<!-- ============================================================
     SIDEBAR COMPONENT
     File: components/sidebar.html
     Berisi: Filter kategori, filter harga, filter rating,
             filter asal daerah, dan promo aktif
     ============================================================ -->
<aside class="sidebar">

  <!-- Filter Header -->
  <div class="flex items-center justify-between mb-5">
    <h2 class="font-display text-lg text-warm-dark">Filter</h2>
    <button class="text-xs text-terracotta hover:underline">Reset Semua</button>
  </div>

  <!-- Kategori -->
  <div class="sidebar-section mb-6">
    <h3 class="font-medium text-sm text-warm-dark mb-3 flex items-center justify-between">
      Kategori
      <svg class="w-4 h-4 text-warm-mid" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </h3>
    <ul class="space-y-1.5">
      <li>
        <label class="flex items-center gap-2.5 cursor-pointer group">
          <input type="checkbox" checked class="w-4 h-4 accent-terracotta rounded" />
          <span class="text-sm text-warm-dark group-hover:text-terracotta transition-colors">Batik Tulis</span>
          <span class="ml-auto text-xs text-warm-mid bg-border-warm/50 px-2 py-0.5 rounded-full">48</span>
        </label>
      </li>
      <li>
        <label class="flex items-center gap-2.5 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 accent-terracotta rounded" />
          <span class="text-sm text-warm-dark group-hover:text-terracotta transition-colors">Batik Cap</span>
          <span class="ml-auto text-xs text-warm-mid bg-border-warm/50 px-2 py-0.5 rounded-full">32</span>
        </label>
      </li>
      <li>
        <label class="flex items-center gap-2.5 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 accent-terracotta rounded" />
          <span class="text-sm text-warm-dark group-hover:text-terracotta transition-colors">Batik Kombinasi</span>
          <span class="ml-auto text-xs text-warm-mid bg-border-warm/50 px-2 py-0.5 rounded-full">19</span>
        </label>
      </li>
      <li>
        <label class="flex items-center gap-2.5 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 accent-terracotta rounded" />
          <span class="text-sm text-warm-dark group-hover:text-terracotta transition-colors">Kerajinan Kayu</span>
          <span class="ml-auto text-xs text-warm-mid bg-border-warm/50 px-2 py-0.5 rounded-full">27</span>
        </label>
      </li>
      <li>
        <label class="flex items-center gap-2.5 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 accent-terracotta rounded" />
          <span class="text-sm text-warm-dark group-hover:text-terracotta transition-colors">Gerabah & Keramik</span>
          <span class="ml-auto text-xs text-warm-mid bg-border-warm/50 px-2 py-0.5 rounded-full">14</span>
        </label>
      </li>
    </ul>
  </div>

  <div class="divider my-0 mb-6"></div>

  <!-- Rentang Harga -->
  <div class="sidebar-section mb-6">
    <h3 class="font-medium text-sm text-warm-dark mb-3">Rentang Harga</h3>
    <div class="space-y-3">
      <input
        type="range"
        min="0"
        max="2000000"
        value="650000"
        class="w-full accent-terracotta"
        id="price-range"
        oninput="updatePrice(this.value)"
      />
      <div class="flex justify-between text-xs text-warm-mid">
        <span>Rp 0</span>
        <span id="price-display" class="text-terracotta font-medium">Rp 650.000</span>
        <span>Rp 2jt</span>
      </div>
      <div class="flex gap-2">
        <input type="text" placeholder="Min" class="flex-1 border border-border-warm rounded-lg px-3 py-1.5 text-xs text-warm-dark outline-none focus:border-terracotta" value="0"/>
        <span class="text-warm-mid text-xs self-center">—</span>
        <input type="text" placeholder="Max" class="flex-1 border border-border-warm rounded-lg px-3 py-1.5 text-xs text-warm-dark outline-none focus:border-terracotta" value="650.000"/>
      </div>
    </div>
  </div>

  <div class="divider my-0 mb-6"></div>

  <!-- Rating -->
  <div class="sidebar-section mb-6">
    <h3 class="font-medium text-sm text-warm-dark mb-3">Rating Minimum</h3>
    <div class="space-y-1.5">
      <label class="flex items-center gap-2 cursor-pointer group">
        <input type="radio" name="rating" class="accent-terracotta" checked />
        <span class="text-terracotta text-sm">★★★★★</span>
        <span class="text-xs text-warm-mid ml-1">5.0</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer group">
        <input type="radio" name="rating" class="accent-terracotta" />
        <span class="text-terracotta text-sm">★★★★</span><span class="text-border-warm text-sm">★</span>
        <span class="text-xs text-warm-mid ml-1">4.0+</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer group">
        <input type="radio" name="rating" class="accent-terracotta" />
        <span class="text-terracotta text-sm">★★★</span><span class="text-border-warm text-sm">★★</span>
        <span class="text-xs text-warm-mid ml-1">3.0+</span>
      </label>
    </div>
  </div>

  <div class="divider my-0 mb-6"></div>

  <!-- Asal Daerah -->
  <div class="sidebar-section mb-6">
    <h3 class="font-medium text-sm text-warm-dark mb-3">Asal Daerah</h3>
    <div class="flex flex-wrap gap-2">
      <button class="px-3 py-1 text-xs border-2 border-terracotta bg-terracotta-pale text-terracotta rounded-full font-medium">Yogyakarta</button>
      <button class="px-3 py-1 text-xs border border-border-warm text-warm-mid rounded-full hover:border-terracotta hover:text-terracotta transition-colors">Solo</button>
      <button class="px-3 py-1 text-xs border border-border-warm text-warm-mid rounded-full hover:border-terracotta hover:text-terracotta transition-colors">Pekalongan</button>
      <button class="px-3 py-1 text-xs border border-border-warm text-warm-mid rounded-full hover:border-terracotta hover:text-terracotta transition-colors">Cirebon</button>
      <button class="px-3 py-1 text-xs border border-border-warm text-warm-mid rounded-full hover:border-terracotta hover:text-terracotta transition-colors">Madura</button>
      <button class="px-3 py-1 text-xs border border-border-warm text-warm-mid rounded-full hover:border-terracotta hover:text-terracotta transition-colors">Bali</button>
    </div>
  </div>

  <div class="divider my-0 mb-6"></div>

  <!-- Promo Banner -->
  <div class="bg-gradient-to-br from-terracotta to-terracotta-light rounded-2xl p-4 text-white text-center">
    <p class="text-2xl mb-1">🎁</p>
    <p class="font-display text-base font-semibold">Promo Hari Ini</p>
    <p class="text-xs opacity-90 mt-1 mb-3">Diskon 25% + cashback Rp 50rb untuk pembelian pertama</p>
    <button class="bg-white text-terracotta text-xs font-bold px-5 py-2 rounded-full hover:bg-cream transition-colors">
      Pakai Sekarang
    </button>
  </div>

  <!-- Toko Terpercaya -->
  <div class="mt-6 bg-white border border-border-warm rounded-2xl p-4">
    <h3 class="font-medium text-sm text-warm-dark mb-3">🏆 Toko Pilihan</h3>
    <div class="space-y-3">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-indigo-100 flex items-center justify-center text-sm font-bold text-indigo-700 shrink-0">SJ</div>
        <div class="min-w-0">
          <p class="text-xs font-medium text-warm-dark truncate">Sekar Jagad Batik</p>
          <p class="text-[10px] text-warm-mid">★ 4.9 · 3.2k penjualan</p>
        </div>
        <button class="shrink-0 text-xs text-terracotta border border-terracotta rounded-full px-2.5 py-1 hover:bg-terracotta-pale transition-colors">Ikuti</button>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-amber-100 flex items-center justify-center text-sm font-bold text-amber-700 shrink-0">NK</div>
        <div class="min-w-0">
          <p class="text-xs font-medium text-warm-dark truncate">Nusantara Kriya</p>
          <p class="text-[10px] text-warm-mid">★ 4.8 · 1.7k penjualan</p>
        </div>
        <button class="shrink-0 text-xs text-terracotta border border-terracotta rounded-full px-2.5 py-1 hover:bg-terracotta-pale transition-colors">Ikuti</button>
      </div>
    </div>
  </div>

</aside>

<script>
  function updatePrice(value) {
    const formatted = new Intl.NumberFormat('id-ID').format(value);
    document.getElementById('price-display').textContent = 'Rp ' + formatted;
  }
</script>
